command:
  - streamlit
  - run
  - app.py
  - --server.address=0.0.0.0
  - --server.port=8000

env:
  - name: SERVING_ENDPOINT
    valueFrom: serving-endpoint
  - name: AGENT_REQUEST_FORMAT
    value: responses
  - name: STREAMLIT_GATHER_USAGE_STATS
    value: "false"

permissions:
  scopes:
    - model-serving
